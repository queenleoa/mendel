[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
  "openzeppelin-contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
galileo = "https://evmrpc-testnet.0g.ai"

[etherscan]
galileo = { key = "", url = "https://chainscan-galileo.0g.ai/api" }
